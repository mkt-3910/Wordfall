<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>プレイ履歴 - 言葉落とし</title>
    <link rel ="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="stage">
    <h1>プレイ履歴</h1>

    <div id="historyList" class="history-list"></div>

    <div class="history-pager">
        <button id="prevBtn" class="primary-btn">前へ</button>
        <span id="pageInfo" class="page-info"></span>
        <button id="nextBtn" class="primary-btn">次へ</button>
    </div>

    <div class="history-back">
        <button id="backBtn" class="primary-btn">タイトルに戻る</button>
    </div>
</div>

<script th:src="@{/js/history.js}"></script>
</body>
</html>
