<!DOCTYPE html>
<html xmlns:th="http:///www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>言葉落とし</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="stage">
    <h1>言葉落とし</h1>

    <div class="layout">
        <div class="board-wrap">
            <canvas id="board" width="384" height="416"></canvas>

            <div id="gameOverMessage" class="overlay"></div>
                <p>ゲームオーバー</p>
        </div>
    </div>

    <div class="side">
        <div class="panel">
            <span class="label">スコア</span>
            <span class="value" id="score">0</span>
        </div>
        <div class="panel">
            <span class="label">英単語</span>
            <span class="value" id="wordCount">0</span>
        </div>

        <div class="wordlog-panel">
            <div class="wordlog-title">できた単語</div>
            <div class="wordLog" class="wordlog-list"></div>
        </div>
    </div>
</div>

<script th:src="@{/js/game.js}"></script>
</body>
</head>
</html>
